server:
  port: 8080 # 项目启动端口

spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 200MB
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver # 数据库驱动类名
    url: jdbc:p6spy:postgresql://localhost:5432/robot # 数据库连接 URL
    username: postgres # 数据库用户名
    password: postgres # 数据库密码
    hikari: # HikariCP 连接池配置
      pool-name: AI-Robot-HikariCP # 自定义连接池名称
      auto-commit: true # 是否自动提交事务
      connection-timeout: 30000 # 连接超时时间（毫秒）
      idle-timeout: 600000 # 空闲连接存活最大时间（毫秒）
      max-lifetime: 1800000 # 连接最大存活时间（毫秒）
      minimum-idle: 5 # 最小空闲连接数
      maximum-pool-size: 20 # 最大连接池大小
      connection-test-query: SELECT 1 # 连接测试查询
      validation-timeout: 5000 # 验证连接的有效性
  ai:
    zhipuai:
      api-key: a464579c69cc4466bb4049161f1b2a13.ywB1937J5qudingQ
      chat:
        options:
          model: glm-4-air
          temperature: 0.7
    deepseek:
      base-url: https://api.deepseek.com
      api-key: sk-62c5786f832a46e8930334cca5687b99
      chat:
        options:
          model: deepseek-reasoner
          temperature: 0.7
    mcp:
      client:
        enabled: true
        stdio:
          servers-configuration: classpath:/mcp-servers-config.json # 指定 MCP 服务的配置文件路径
        toolcallback:
          enabled: true # 开启 MCP 客户端的工具回调（Tool Callback）功能
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode # OpenAI 服务的访问地址，这里使用的是阿里云百炼
      api-key: sk-8a012320964143efbbfe55970c013f69  # 填写阿里云百炼的 API Key, 该成你自己的
      chat:
        options:
          model: qwen-omni-turbo # 模型名称
          temperature: 0.7 # 温度值
          max-tokens: 1024  # 限制单次最大输出，避免超长文本耗Token
      embedding:
        options:
          model: text-embedding-v4 # 向量化模型
          dimensions: 1536 # 维度
    vectorstore:
        pgvector:
            index-type: HNSW # 索引类型
            distance-type: COSINE_DISTANCE # 距离类型
            dimensions: 1536 # 嵌入维度
            max-document-batch-size: 10000 # 每批处理的最大文档数
            table-name: t_vector_store # 向量表名称

okhttp: # OkHttp 客户端配置
  connect-timeout: 5000    # 建立连接的最大等待时间（毫秒）
  read-timeout: 30000      # 读取数据的最大等待时间（毫秒）
  write-timeout: 15000     # 写入数据的最大等待时间（毫秒）
  max-idle-connections: 200 # 连接池中保持的最大空闲连接数
  keep-alive-duration: 5   # 空闲连接在连接池中的存活时间（分钟）

searxng: # SearXNG 搜索引擎配置
  url: http://localhost:8888/search # SearXNG 服务的 API 端点地址
  count: 10 # 每次从搜索结果中，提取的最大数量

customer-service:
  md-storage-path: D:\develop\Code\xiaoha-ai-robot # Markdown 问答文件存储路径
  model: qwen-omni-turbo
  temperature: 0.7

